name: Publish playground

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/bin/wasm-bindgen-test-runner
            ~/.cargo/bin/wasm2es6js
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install wasm-bindgen
        run: |
          version=$(cargo metadata --locked --format-version 1 \
            | jq -r '.packages[] | select(.name == "wasm-bindgen") | .version')
          installed=$(wasm-bindgen --version 2>/dev/null | awk '{print $2}' || true)
          if [ "$installed" != "$version" ]; then
            cargo install wasm-bindgen-cli --version "$version" --locked
          fi

      - name: Build WebAssembly
        run: cargo build -p picocaml-playground --release --target wasm32-unknown-unknown --lib

      - name: Assemble site
        run: |
          mkdir -p site/pkg
          cp -R playground/web/. site/
          wasm-bindgen target/wasm32-unknown-unknown/release/picocaml_playground.wasm \
            --target web --out-dir site/pkg
          touch site/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - uses: actions/deploy-pages@v5
